<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio Viola Raiz</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#205a29;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background-image:linear-gradient(#2f7d32,#173d1d);
}

.card{
width:380px;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 30px rgba(0,0,0,.4);
}

img{
width:100%;
display:block;
}

.info{
padding:20px;
text-align:center;
}

h1{
color:#2f7d32;
}

p{
margin-top:10px;
color:#555;
}

button{
margin-top:20px;
padding:15px 40px;
font-size:18px;
background:#2f7d32;
color:white;
border:none;
border-radius:50px;
cursor:pointer;
}

button:hover{
background:#205a29;
}

footer{
margin-top:20px;
font-size:13px;
color:#777;
}

</style>

</head>

<body>

<div class="card">

<img src="logo.jpg">

<div class="info">

<h1>Rádio Viola Raiz</h1>

<p>100% Música Caipira</p>

<audio id="radio">
<source src="https://stm15.xcast.com.br:6826/" type="audio/mpeg">
</audio>

<button onclick="playRadio()" id="botao">
▶ Ouvir Agora
</button>

<footer>

Ao vivo 24 horas

</footer>

</div>

</div>

<script>

var radio=document.getElementById("radio");
var botao=document.getElementById("botao");

function playRadio(){

if(radio.paused){

radio.play();

botao.innerHTML="⏸ Pausar";

}else{

radio.pause();

botao.innerHTML="▶ Ouvir Agora";

}

}

</script>

</body>
</html>
